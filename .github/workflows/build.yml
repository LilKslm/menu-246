name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'          # triggers on version tags like v1.0.0, v1.1.0
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Menu246-Windows.exe
            build_flag: --win
          - os: macos-latest
            artifact: Menu246-Mac.dmg
            build_flag: --mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Build desktop app
        run: npx electron-builder ${{ matrix.build_flag }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # skip code signing

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.dmg
          if-no-files-found: warn
          retention-days: 30
