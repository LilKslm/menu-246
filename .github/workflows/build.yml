name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Menu246-Windows.exe
            build_flag: --win
          - os: macos-latest
            artifact: Menu246-Mac.dmg
            build_flag: --mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Build desktop app
        run: npx electron-builder ${{ matrix.build_flag }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.dmg
          if-no-files-found: warn
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Menu246-Windows.exe
          path: release/

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: Menu246-Mac.dmg
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Menu 246 ${{ github.ref_name }}
          body: |
            ## Menu 246 ${{ github.ref_name }}

            ### Téléchargements
            - **Windows** : téléchargez le fichier `.exe` ci-dessous
            - **Mac** : téléchargez le fichier `.dmg` ci-dessous
          files: |
            release/*.exe
            release/*.dmg
          draft: false
          prerelease: false
